# Prod compose: db не светим наружу, app не светим напрямую,
# наружу только Caddy на 80/443 с TLS и basic-auth на /admin/*.
#
# Использование:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec app alembic upgrade head

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Только localhost: используется SSH-туннелем для sync embeddings.
    # Снаружи Postgres недоступен — никакого 0.0.0.0:5432.
    ports:
      - "127.0.0.1:5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_NAME: ${APP_NAME}
      APP_VERSION: ${APP_VERSION}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
    # Без --reload и без volume-mount: код прибит в образе.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    # БЕЗ блока ports: app доступен только Caddy через docker-network.

  caddy:
    image: caddy:2-alpine
    depends_on: [app]
    environment:
      DOMAIN: ${DOMAIN}
      # bcrypt-хеш basic-auth для путей /admin/*. Сгенерировать:
      #   docker run --rm caddy:2-alpine caddy hash-password
      CADDY_ADMIN_USER: ${CADDY_ADMIN_USER}
      CADDY_ADMIN_HASH: ${CADDY_ADMIN_HASH}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # сюда складывает Let's Encrypt сертификаты
      - caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
