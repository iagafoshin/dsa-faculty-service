# Prod compose: app публикуется на 127.0.0.1:8000 для host-nginx (или
# другого reverse-proxy на хосте), который сам делает TLS + проксирует.
# db доступна только локально через 127.0.0.1:5433 — для SSH-туннеля
# при sync_embeddings_to_prod.py. Снаружи Postgres не виден вообще.
#
# Использование:
#   docker compose -f docker-compose.prod.yml up -d --build
#   docker compose -f docker-compose.prod.yml exec app alembic upgrade head

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Только localhost — для SSH-туннеля при sync embeddings.
      - "127.0.0.1:5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_NAME: ${APP_NAME}
      APP_VERSION: ${APP_VERSION}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      # Биндим на localhost — host-nginx (или другой proxy) проксирует
      # сюда. Наружу 8000 не светим, TLS — забота nginx'а.
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

volumes:
  pgdata:
