<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DSA Faculty{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // HSE-палитра: тёмный navy с акцентом, минимум градиентов.
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            hse: {
              50: '#f3f5fa',
              100: '#e2e7f1',
              200: '#bcc6dd',
              300: '#8294b9',
              500: '#3c4d80',
              600: '#26356a',
              700: '#102d69',   // основной фирменный navy
              800: '#0b2256',
              900: '#071a44',
            },
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['"PT Serif"', 'Charter', 'Georgia', 'serif'],
          },
          borderRadius: {
            DEFAULT: '4px',
            'lg': '4px',
            'md': '4px',
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    h1, h2 { font-family: 'PT Serif', Charter, Georgia, serif; letter-spacing: -0.01em; }
    .chip { display:inline-block; padding: 2px 8px; border-radius: 3px;
            background: #f3f5fa; color: #102d69; font-size: 0.75rem;
            margin: 1px 2px; }
    .progress { background: #e5e7eb; height: 6px; border-radius: 2px; overflow:hidden; }
    .progress > div { background: #102d69; height: 100%; }
    .truncate-2 { display:-webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tier-badge { display:inline-block; padding: 2px 10px; border-radius: 2px;
                  font-size: 0.7rem; font-weight: 500; letter-spacing: 0.02em;
                  text-transform: uppercase; }
    .tier-strong { background: #dcfce7; color: #166534; }
    .tier-medium { background: #fef3c7; color: #92400e; }
    .tier-weak   { background: #f1f5f9; color: #64748b; }
    .query-chip { display:inline-block; padding: 4px 10px; border-radius: 2px;
                  background: #fff; color: #102d69; font-size: 0.78rem;
                  border: 1px solid #bcc6dd; cursor: pointer;
                  transition: background 0.15s, color 0.15s, border-color 0.15s; }
    .query-chip:hover { background: #102d69; color: #fff; border-color: #102d69; }
  </style>
</head>
<body class="bg-white text-slate-900">

<nav class="sticky top-0 z-10 bg-hse-700 text-white border-b border-hse-800">
  <div class="max-w-6xl mx-auto px-4 h-14 flex items-center gap-6">
    <a href="/" class="font-serif font-bold text-lg whitespace-nowrap">DSA Faculty</a>
    <a href="/" class="text-sm text-hse-100 hover:text-white whitespace-nowrap">Подбор научрука</a>
    <a href="/publications" class="text-sm text-hse-100 hover:text-white whitespace-nowrap">Публикации</a>
    {# /admin доступен напрямую через URL, но из навбара пока скрыт —
       страница без аутентификации, не палим в публичной шапке. #}
    <div class="ml-auto text-xs text-hse-200">
      <a href="/docs" class="hover:text-white">API</a>
    </div>
  </div>
</nav>

<main class="max-w-6xl mx-auto px-4 py-6 sm:py-8">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-xs text-slate-400 py-8 border-t border-slate-100 mt-12">
  Источник данных: hse.ru · контракт: <a href="/docs" class="underline">/docs</a>
</footer>

</body>
</html>
