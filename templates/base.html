<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DSA Faculty{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Палитра — нейтральная slate с одним акцентом (deep indigo).
    // Без жёсткой привязки к одному бренду: clean, читаемо, профессионально.
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
            serif: ['Newsreader', 'Charter', 'Georgia', 'serif'],
          },
          colors: {
            ink: {
              50:  '#f8fafc',
              100: '#f1f5f9',
              200: '#e2e8f0',
              300: '#cbd5e1',
              400: '#94a3b8',
              500: '#64748b',
              600: '#475569',
              700: '#334155',
              800: '#1e293b',
              900: '#0f172a',
            },
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    h1, h2, h3 { letter-spacing: -0.015em; }
    .display { font-family: 'Newsreader', Charter, Georgia, serif; font-weight: 500; letter-spacing: -0.02em; }
    .chip { display:inline-block; padding: 3px 9px; border-radius: 6px;
            background: #f1f5f9; color: #334155; font-size: 0.74rem;
            margin: 1px 2px; line-height: 1.4; }
    .truncate-2 { display:-webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .tier-badge { display:inline-flex; align-items:center; gap: 4px;
                  padding: 2px 8px; border-radius: 9999px;
                  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.02em; }
    .tier-badge::before { content:''; width: 6px; height: 6px; border-radius: 9999px; display:inline-block; }
    .tier-strong { background: #dcfce7; color: #166534; }
    .tier-strong::before { background: #16a34a; }
    .tier-medium { background: #fef3c7; color: #92400e; }
    .tier-medium::before { background: #f59e0b; }
    .tier-weak   { background: #f1f5f9; color: #64748b; }
    .tier-weak::before { background: #94a3b8; }
    .query-chip { display:inline-block; padding: 6px 12px; border-radius: 9999px;
                  background: #ffffff; color: #334155; font-size: 0.8rem;
                  border: 1px solid #e2e8f0; cursor: pointer; font-weight: 500;
                  transition: all 0.15s; }
    .query-chip:hover { background: #0f172a; color: #fff; border-color: #0f172a; }
    .stat-dot { display: inline-flex; align-items: baseline; gap: 4px;
                font-size: 0.72rem; color: #64748b; }
    .stat-dot b { color: #0f172a; font-weight: 600; font-size: 0.78rem; }
    .pill { display:inline-block; padding: 1px 8px; border-radius: 4px;
            font-size: 0.66rem; font-weight: 600; letter-spacing: 0.04em;
            text-transform: uppercase; background: #eef2ff; color: #3730a3; }
  </style>
</head>
<body class="bg-ink-50 text-ink-900 min-h-screen">

<header class="bg-white border-b border-ink-200 sticky top-0 z-10">
  <div class="max-w-6xl mx-auto px-4 h-14 flex items-center gap-8">
    <a href="/" class="font-bold text-base text-ink-900 whitespace-nowrap tracking-tight">DSA Faculty</a>
    <nav class="flex items-center gap-5 text-sm">
      <a href="/" class="text-ink-600 hover:text-ink-900 font-medium whitespace-nowrap">Поиск руководителя</a>
      <a href="/publications" class="text-ink-600 hover:text-ink-900 font-medium whitespace-nowrap">Публикации</a>
    </nav>
    <div class="ml-auto flex items-center gap-4 text-xs">
      <a href="/admin" class="text-ink-400 hover:text-ink-700">Админ</a>
      <a href="/docs" class="text-ink-400 hover:text-ink-700">API</a>
    </div>
  </div>
</header>

<main class="max-w-6xl mx-auto px-4 py-10">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-xs text-ink-400 py-10 border-t border-ink-100 mt-16">
  Источник данных: hse.ru · контракт: <a href="/docs" class="underline hover:text-ink-600">/docs</a>
</footer>

</body>
</html>
