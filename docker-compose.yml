# Compose-конфигурация для production-деплоя на VPS.
#
# В dev на воркстейшне обычно поднимается **только Postgres** для
# локального FastAPI/NLP из venv:
#
#   docker compose up -d db      # только postgres
#   uvicorn app.main:app --reload   # FastAPI локально из venv
#
# В prod стартуют оба сервиса:
#
#   docker compose up -d --build
#   docker compose exec app alembic upgrade head

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Биндим на localhost — в dev локальный venv достучится к 5433,
      # в prod через SSH-туннель для sync_embeddings_to_prod.py.
      # Снаружи Postgres не виден.
      - "127.0.0.1:5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      APP_NAME: ${APP_NAME}
      APP_VERSION: ${APP_VERSION}
      CORS_ORIGINS: ${CORS_ORIGINS}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      # HTTP Basic auth для /admin (UI). Если пусто — UI закрыт 403.
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # Периодический job: scrape + ВКР + enrich пустых embedding'ов
      # раз в N суток. 0 = выключен.
      SCHEDULE_DAYS: ${SCHEDULE_DAYS:-0}
      SCHEDULE_RUN_ON_STARTUP: ${SCHEDULE_RUN_ON_STARTUP:-false}
    ports:
      # Биндим на localhost — host-nginx (или другой proxy в проде)
      # проксирует сюда. Наружу 8000 не светим, TLS — забота nginx'а.
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

volumes:
  pgdata:
